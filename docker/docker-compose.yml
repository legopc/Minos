services:
  patchbox:
    build:
      context: ..
      dockerfile: Dockerfile
    image: dante-patchbox:latest
    container_name: dante-patchbox
    restart: unless-stopped
    # Use host networking so the service can reach Dante multicast and PTP.
    # Required for real Dante I/O (--features inferno build).
    # For stub/testing mode you can remove network_mode and publish ports instead.
    network_mode: host
    environment:
      - PATCHBOX_PORT=8080
      # Override to load a config from a host-mounted path:
      # - PATCHBOX_CONFIG=/etc/patchbox/config.toml
      - RUST_LOG=patchbox=info
    volumes:
      # Persist scenes across restarts
      - patchbox-scenes:/var/lib/patchbox/scenes
      # Mount a custom config file (optional)
      # - ./config.toml:/etc/patchbox/config.toml:ro
    cap_add:
      # Needed for Dante multicast socket operations when running with inferno feature
      - NET_RAW
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  patchbox-scenes:
