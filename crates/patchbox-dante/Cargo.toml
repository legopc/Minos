[package]
name        = "patchbox-dante"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "inferno_aoip integration for dante-patchbox — Dante I/O layer"

[features]
# Enable real Dante audio I/O via inferno_aoip.
# Requires: a running PTP/statime clock daemon, CAP_NET_RAW, Dante network.
# Without this feature the crate compiles and runs with silence stubs.
default = []
inferno = ["dep:inferno_aoip"]

[dependencies]
patchbox-core = { workspace = true }
tokio         = { workspace = true }
anyhow        = { workspace = true }
thiserror     = { workspace = true }
tracing       = { workspace = true }
serde         = { workspace = true }
atomic        = "0.6"

# Real Dante I/O — feature-gated: requires PTP daemon at runtime, not safe for CI
inferno_aoip = { git = "https://github.com/teodly/inferno", optional = true }
