<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dante-patchbox</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- Login overlay -->
  <div class="login-overlay" id="login-overlay">
    <div class="login-box">
      <h2>dante-patchbox</h2>
      <div class="login-field">
        <label for="login-user">Username</label>
        <input type="text" id="login-user" autocomplete="username">
      </div>
      <div class="login-field">
        <label for="login-pass">Password</label>
        <input type="password" id="login-pass" autocomplete="current-password">
      </div>
      <button id="login-btn" class="login-btn">Login</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- Main app (hidden until authenticated) -->
  <div id="app" style="display:none">
    <header>
      <div class="header-left">
        <span class="app-title">🦞 dante-patchbox</span>
        <span id="device-meta" class="dim-text"></span>
      </div>
      <div class="header-right">
        <span id="user-badge" class="dim-text"></span>
        <button id="logout-btn" class="btn-logout">logout</button>
        <span class="ws-badge">
          <span class="ws-dot" id="ws-dot"></span>
          <span id="ws-label">connecting</span>
        </span>
      </div>
    </header>

    <main class="container">
      <!-- Panic / emergency mute bar -->
      <div class="panic-bar" id="panic-bar">
        <button class="btn-panic" id="btn-mute-all">⚠ MUTE ALL</button>
        <button class="btn-unmute-all" id="btn-unmute-all">Unmute All</button>
        <span id="mute-status" class="dim-text"></span>
      </div>

      <!-- Routing Matrix -->
      <section id="section-matrix">
        <div class="section-head"><h2>Routing Matrix</h2></div>
        <div class="section-body">
          <div class="matrix-scroll">
            <table class="matrix-table" id="matrix-table"></table>
          </div>
        </div>
      </section>

      <!-- Input Gains -->
      <section id="section-input-gains">
        <div class="section-head"><h2>Input Gains — Sources</h2></div>
        <div class="section-body">
          <div class="gains-grid" id="input-gains"></div>
        </div>
      </section>

      <!-- Output Gains -->
      <section id="section-output-gains">
        <div class="section-head"><h2>Output Gains — Zones</h2></div>
        <div class="section-body">
          <div class="gains-grid" id="output-gains"></div>
        </div>
      </section>

      <!-- Scenes -->
      <section id="section-scenes">
        <div class="section-head"><h2>Scenes</h2></div>
        <div class="section-body">
          <div class="scenes-panel">
            <div class="save-row">
              <input type="text" id="scene-name-input" placeholder="Scene name…">
              <button class="btn" id="btn-save-scene">Save Current</button>
            </div>
            <div id="scene-list"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Toast notifications -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/app.js" defer></script>
</body>
</html>
