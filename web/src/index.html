<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dante-patchbox</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/shell.css">
  <link rel="stylesheet" href="/css/matrix.css">
  <link rel="stylesheet" href="/css/mixer.css">
  <link rel="stylesheet" href="/css/zones.css">
  <link rel="stylesheet" href="/css/scenes.css">
  <link rel="stylesheet" href="/css/panels.css">
  <link rel="stylesheet" href="/css/dante.css">
  <link rel="stylesheet" href="/css/system.css">
</head>
<body>
<div id="offline-banner" hidden aria-live="assertive" role="alert" style="display:none">
  ⚠ OFFLINE — reconnecting…
</div>

<!-- Login overlay -->
<div id="login-page" style="display:none">
  <div class="login-box">
    <h2>dante-patchbox</h2>
    <input type="text" id="login-user" placeholder="username" autocomplete="username">
    <input type="password" id="login-pass" placeholder="password" autocomplete="current-password">
    <button class="login-btn" id="login-btn">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app-shell">
  <!-- Tab bar -->
  <div id="tabbar">
    <button class="tab-btn active" data-tab="matrix">Matrix</button>
    <button class="tab-btn" data-tab="mixer">Mixer</button>
    <button class="tab-btn" data-tab="scenes">Scenes</button>
    <button class="tab-btn" data-tab="zones">Zones</button>
    <button class="tab-btn" data-tab="dante">Dante</button>
    <button class="tab-btn" data-tab="system">System</button>
    <span class="tabbar-spacer"></span>
    <span class="tabbar-logo">&#9679; dante-patchbox</span>
    <span class="tabbar-device" id="tb-device"></span>
    <span class="tabbar-sep">|</span>
    <span class="tabbar-user" id="tb-user"></span>
    <a class="tabbar-help" href="/docs/" target="_blank" rel="noopener" title="Open user manual">?</a>
  </div>

  <!-- Main content area -->
  <div id="app">
    <div id="tab-matrix"  class="tab-content active"></div>
    <div id="tab-mixer"   class="tab-content"></div>
    <div id="tab-scenes"  class="tab-content"></div>
    <div id="tab-zones"   class="tab-content"></div>
    <div id="tab-dante"   class="tab-content"></div>
    <div id="tab-system"  class="tab-content"></div>

    <!-- Toast container -->
    <div class="toast-container" id="toasts"></div>
  </div>

  <!-- Status bar -->
  <div id="statusbar">
    <span class="status-item" id="sb-ptp">
      <span class="dot dot-offline"></span>PTP
    </span>
    <span class="status-sep">|</span>
    <span class="status-item" id="sb-rate">—</span>
    <span class="status-sep">|</span>
    <span class="status-item" id="sb-rx">—</span>
    <span class="status-sep">|</span>
    <span class="status-item" id="sb-tx">—</span>
    <span class="status-sep">|</span>
    <span class="status-item" id="sb-zones">—</span>
    <span class="status-sep">|</span>
    <span class="status-item" id="sb-drops" title="Audio drop count since last restart">Drops: —</span>
    <span class="status-sep">|</span>
    <span class="status-item" id="sb-ws">
      <span class="dot dot-offline"></span>WS
    </span>
  </div>
</div>

<script type="module" src="/js/main.js"></script>
</body>
</html>
