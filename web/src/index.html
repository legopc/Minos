<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dante-patchbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --surface: #1a1a1a; --border: #2a2a2a;
    --text: #e0e0e0; --dim: #666; --amber: #f5a623; --red: #e05252; --green: #52e08a;
  }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 13px; }
  header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
  header h1 { color: var(--amber); font-size: 18px; font-weight: 600; letter-spacing: 0.05em; }
  header .meta { color: var(--dim); font-size: 12px; }
  .container { padding: 24px; display: flex; flex-direction: column; gap: 32px; }
  section h2 { color: var(--amber); font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }

  /* Matrix table */
  .matrix-wrap { overflow-x: auto; }
  table { border-collapse: collapse; min-width: 100%; }
  th { color: var(--dim); font-weight: 400; padding: 6px 12px; text-align: center; white-space: nowrap; }
  th.zone-header { text-align: left; color: var(--text); }
  td { padding: 6px 12px; text-align: center; border: 1px solid var(--border); }
  td.zone-name { text-align: left; white-space: nowrap; }
  td.zone-name a { color: var(--amber); text-decoration: none; }
  td.zone-name a:hover { text-decoration: underline; }
  input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--amber); cursor: pointer; }

  /* Gain sliders */
  .gains { display: flex; flex-direction: column; gap: 10px; }
  .gain-row { display: flex; align-items: center; gap: 12px; }
  .gain-label { width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  input[type=range] { flex: 1; accent-color: var(--amber); cursor: pointer; }
  .gain-value { width: 60px; text-align: right; color: var(--amber); font-size: 12px; }

  .status { position: fixed; bottom: 16px; right: 16px; background: var(--surface); border: 1px solid var(--border);
    padding: 8px 14px; border-radius: 4px; font-size: 11px; color: var(--dim); opacity: 0; transition: opacity 0.3s; }
  .status.show { opacity: 1; }
  .status.ok { color: var(--green); }
  .status.err { color: var(--red); }
</style>
</head>
<body>
<header>
  <h1>🦞 dante-patchbox</h1>
  <span class="meta" id="header-meta">loading...</span>
</header>
<div class="container">
  <section>
    <h2>Routing Matrix</h2>
    <div class="matrix-wrap">
      <table id="matrix-table"><tr><th>—</th></tr></table>
    </div>
  </section>
  <section>
    <h2>Input Gains (Sources)</h2>
    <div class="gains" id="input-gains"></div>
  </section>
  <section>
    <h2>Output Gains (Zones)</h2>
    <div class="gains" id="output-gains"></div>
  </section>
</div>
<div class="status" id="status-toast"></div>

<script>
let cfg = null;

function showStatus(msg, ok) {
  const el = document.getElementById('status-toast');
  el.textContent = msg;
  el.className = 'status show ' + (ok ? 'ok' : 'err');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'status', 2000);
}

async function api(method, path, body) {
  try {
    const r = await fetch(path, {
      method, headers: {'Content-Type': 'application/json'},
      body: body ? JSON.stringify(body) : undefined
    });
    if (!r.ok) throw new Error(await r.text());
    showStatus('saved', true);
  } catch(e) {
    showStatus('error: ' + e.message, false);
  }
}

function buildMatrix() {
  const t = document.getElementById('matrix-table');
  t.innerHTML = '';
  // Header row
  const hr = document.createElement('tr');
  const th0 = document.createElement('th');
  th0.className = 'zone-header';
  th0.textContent = 'Zone \\ Source';
  hr.appendChild(th0);
  cfg.sources.forEach(s => {
    const th = document.createElement('th');
    th.textContent = s;
    hr.appendChild(th);
  });
  t.appendChild(hr);
  // Data rows
  cfg.zones.forEach((zone, tx) => {
    const tr = document.createElement('tr');
    const td0 = document.createElement('td');
    td0.className = 'zone-name';
    const a = document.createElement('a');
    a.href = '/zone/' + encodeURIComponent(zone);
    a.target = '_blank';
    a.textContent = zone;
    td0.appendChild(a);
    tr.appendChild(td0);
    cfg.sources.forEach((_, rx) => {
      const td = document.createElement('td');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = cfg.matrix[tx][rx];
      cb.onchange = () => api('PUT', '/api/v1/matrix', {tx, rx, enabled: cb.checked});
      td.appendChild(cb);
      tr.appendChild(td);
    });
    t.appendChild(tr);
  });
}

function buildGains() {
  function makeSlider(container, label, value, min, max, onchange) {
    const row = document.createElement('div');
    row.className = 'gain-row';
    const lbl = document.createElement('span');
    lbl.className = 'gain-label';
    lbl.textContent = label;
    const slider = document.createElement('input');
    slider.type = 'range';
    slider.min = min; slider.max = max; slider.step = 0.5;
    slider.value = value;
    const val = document.createElement('span');
    val.className = 'gain-value';
    val.textContent = value.toFixed(1) + ' dB';
    slider.oninput = () => { val.textContent = parseFloat(slider.value).toFixed(1) + ' dB'; };
    slider.onchange = () => onchange(parseFloat(slider.value));
    row.appendChild(lbl); row.appendChild(slider); row.appendChild(val);
    container.appendChild(row);
  }

  const ig = document.getElementById('input-gains');
  ig.innerHTML = '';
  cfg.sources.forEach((s, i) => {
    makeSlider(ig, s, cfg.input_gain_db[i], -20, 6, db => api('PUT', '/api/v1/gain/input', {channel: i, db}));
  });

  const og = document.getElementById('output-gains');
  og.innerHTML = '';
  cfg.zones.forEach((z, i) => {
    makeSlider(og, z, cfg.output_gain_db[i], -60, 0, db => api('PUT', '/api/v1/gain/output', {channel: i, db}));
  });
}

async function loadConfig() {
  const r = await fetch('/api/v1/config');
  cfg = await r.json();
  document.getElementById('header-meta').textContent =
    cfg.rx_channels + ' sources → ' + cfg.tx_channels + ' zones';
  buildMatrix();
  buildGains();
}

loadConfig();
</script>
</body>
</html>
