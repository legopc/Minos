<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dante-patchbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --surface: #161616; --surface2: #1e1e1e;
    --border: #2a2a2a; --text: #e0e0e0; --dim: #555;
    --amber: #f5a623; --green: #52e08a; --red: #e05252; --blue: #52aaff;
  }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 13px; min-height: 100vh; }

  header {
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: var(--bg); z-index: 100;
  }
  header h1 { color: var(--amber); font-size: 16px; font-weight: 600; letter-spacing: 0.05em; }
  .ws-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); display: inline-block; margin-right: 6px; transition: background 0.3s; }
  .ws-dot.connected { background: var(--green); }
  .header-right { display: flex; align-items: center; gap: 16px; color: var(--dim); font-size: 11px; }

  .container { padding: 24px; display: flex; flex-direction: column; gap: 32px; max-width: 1200px; }

  section h2 {
    color: var(--amber); font-size: 11px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  section h2::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Matrix */
  .matrix-wrap { overflow-x: auto; }
  table { border-collapse: collapse; }
  th { color: var(--dim); font-weight: 400; font-size: 11px; padding: 6px 14px; white-space: nowrap; text-align: center; }
  th.row-header { text-align: left; min-width: 120px; color: var(--text); }
  td { padding: 4px 14px; text-align: center; border: 1px solid var(--border); }
  td.zone-cell { text-align: left; background: var(--surface); padding: 6px 14px; }
  td.zone-cell a { color: var(--amber); text-decoration: none; font-size: 12px; }
  td.zone-cell a:hover { text-decoration: underline; }
  .cb-cell { background: var(--surface); }
  .cb-cell:has(input:checked) { background: #1a1500; }
  input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--amber); cursor: pointer; }

  /* Meter bar */
  .meter { width: 100%; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 4px; }
  .meter-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.05s; width: 0%; }
  .meter-fill.hot { background: var(--amber); }
  .meter-fill.clip { background: var(--red); }

  /* Gain rows */
  .gains { display: flex; flex-direction: column; gap: 12px; }
  .gain-row { display: grid; grid-template-columns: 160px 1fr 70px; align-items: center; gap: 12px; }
  .gain-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12px; }
  .gain-right { display: flex; flex-direction: column; gap: 3px; }
  input[type=range] { width: 100%; accent-color: var(--amber); cursor: pointer; height: 3px; }
  .gain-value { text-align: right; color: var(--amber); font-size: 11px; }

  /* Toast */
  .toast { position: fixed; bottom: 20px; right: 20px; padding: 8px 16px;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 4px;
    font-size: 11px; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .toast.ok { color: var(--green); border-color: var(--green); }
  .toast.err { color: var(--red); border-color: var(--red); }
</style>
</head>
<body>
<header>
  <h1>🦞 dante-patchbox</h1>
  <div class="header-right">
    <span id="header-meta">—</span>
    <span><span class="ws-dot" id="ws-dot"></span><span id="ws-status">connecting</span></span>
  </div>
</header>
<div class="container">
  <section>
    <h2>Routing Matrix</h2>
    <div class="matrix-wrap"><table id="matrix-table"></table></div>
  </section>
  <section>
    <h2>Input Gains — Sources</h2>
    <div class="gains" id="input-gains"></div>
  </section>
  <section>
    <h2>Output Gains — Zones</h2>
    <div class="gains" id="output-gains"></div>
  </section>
</div>
<div class="toast" id="toast"></div>

<script>
let cfg = null;
const meters = { rx: [], tx: [] };

function toast(msg, ok) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + (ok ? 'ok' : 'err');
  clearTimeout(el._t); el._t = setTimeout(() => el.className = 'toast', 1800);
}

async function api(method, path, body) {
  try {
    const r = await fetch(path, {
      method, headers: {'Content-Type': 'application/json'},
      body: body ? JSON.stringify(body) : undefined
    });
    if (!r.ok) throw new Error(await r.text());
    toast('saved', true);
  } catch(e) { toast('error: ' + e.message, false); }
}

// WebSocket metering
function connectWS() {
  const ws = new WebSocket('ws://' + location.host + '/ws');
  const dot = document.getElementById('ws-dot');
  const status = document.getElementById('ws-status');

  ws.onopen = () => { dot.className = 'ws-dot connected'; status.textContent = 'live'; };
  ws.onclose = () => {
    dot.className = 'ws-dot'; status.textContent = 'reconnecting';
    setTimeout(connectWS, 2000);
  };
  ws.onmessage = e => {
    const frame = JSON.parse(e.data);
    frame.rx_rms.forEach((v, i) => { if (meters.rx[i]) updateMeter(meters.rx[i], v); });
    frame.tx_rms.forEach((v, i) => { if (meters.tx[i]) updateMeter(meters.tx[i], v); });
  };
}

function updateMeter(el, rms) {
  const pct = Math.min(rms * 100 * 2.5, 100);
  el.style.width = pct + '%';
  el.className = 'meter-fill' + (pct > 90 ? ' clip' : pct > 70 ? ' hot' : '');
}

function buildMatrix() {
  const t = document.getElementById('matrix-table');
  t.innerHTML = '';
  const hr = t.insertRow();
  const th0 = document.createElement('th'); th0.className = 'row-header';
  th0.textContent = 'Zone \\ Source'; hr.appendChild(th0);
  cfg.sources.forEach((s, rx) => {
    const th = document.createElement('th');
    // Source name + meter
    th.innerHTML = s + '<div class="meter"><div class="meter-fill" id="rx-m-' + rx + '"></div></div>';
    hr.appendChild(th);
    meters.rx[rx] = document.getElementById('rx-m-' + rx);
  });
  cfg.zones.forEach((zone, tx) => {
    const tr = t.insertRow();
    const td0 = tr.insertCell(); td0.className = 'zone-cell';
    td0.innerHTML = '<a href="/zone/' + encodeURIComponent(zone) + '" target="_blank">' + zone + '</a>' +
      '<div class="meter"><div class="meter-fill" id="tx-m-' + tx + '"></div></div>';
    meters.tx[tx] = document.getElementById('tx-m-' + tx);
    cfg.sources.forEach((_, rx) => {
      const td = tr.insertCell(); td.className = 'cb-cell';
      const cb = document.createElement('input'); cb.type = 'checkbox';
      cb.checked = cfg.matrix[tx][rx];
      cb.onchange = () => api('PUT', '/api/v1/matrix', {tx, rx, enabled: cb.checked});
      td.appendChild(cb);
    });
  });
}

function buildGains() {
  function slider(container, label, val, min, max, step, onchange, meterId) {
    const row = document.createElement('div'); row.className = 'gain-row';
    const lbl = document.createElement('span'); lbl.className = 'gain-label'; lbl.textContent = label;
    const right = document.createElement('div'); right.className = 'gain-right';
    const sl = document.createElement('input'); sl.type = 'range';
    sl.min = min; sl.max = max; sl.step = step; sl.value = val;
    const m = document.createElement('div'); m.className = 'meter';
    const mf = document.createElement('div'); mf.className = 'meter-fill';
    if (meterId) { mf.id = meterId; }
    m.appendChild(mf); right.appendChild(sl); right.appendChild(m);
    const valEl = document.createElement('span'); valEl.className = 'gain-value';
    valEl.textContent = parseFloat(val).toFixed(1) + ' dB';
    sl.oninput = () => valEl.textContent = parseFloat(sl.value).toFixed(1) + ' dB';
    sl.onchange = () => onchange(parseFloat(sl.value));
    row.appendChild(lbl); row.appendChild(right); row.appendChild(valEl);
    container.appendChild(row);
    return mf;
  }
  const ig = document.getElementById('input-gains'); ig.innerHTML = '';
  cfg.sources.forEach((s, i) => {
    const mf = slider(ig, s, cfg.input_gain_db[i], -20, 6, 0.5,
      db => api('PUT', '/api/v1/gain/input', {channel: i, db}));
    // also register as rx meter in the gain section
    if (!meters.rx[i]) meters.rx[i] = mf;
  });
  const og = document.getElementById('output-gains'); og.innerHTML = '';
  cfg.zones.forEach((z, i) => {
    const mf = slider(og, z, cfg.output_gain_db[i], -60, 0, 0.5,
      db => api('PUT', '/api/v1/gain/output', {channel: i, db}));
    if (!meters.tx[i]) meters.tx[i] = mf;
  });
}

async function load() {
  const r = await fetch('/api/v1/config');
  cfg = await r.json();
  document.getElementById('header-meta').textContent =
    cfg.rx_channels + ' sources → ' + cfg.tx_channels + ' zones';
  buildMatrix();
  buildGains();
}

load();
connectWS();
</script>
</body>
</html>
