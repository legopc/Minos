<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>patchbox — zone</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="zone-page">
  <header>
    <div class="header-left">
      <span class="app-title" style="font-size:11px;color:var(--dim)">🦞 dante-patchbox</span>
      <span id="zone-title" class="zone-name"></span>
    </div>
    <div class="header-right">
      <a href="/" id="admin-link" class="back-link">← admin</a>
      <span class="ws-badge">
        <span class="ws-dot" id="ws-dot"></span>
      </span>
    </div>
  </header>

  <div class="zone-container">

    <!-- Source selector -->
    <section>
      <h2>Source</h2>
      <div class="source-list" id="source-list">
        <!-- buttons injected by zone.js -->
      </div>
    </section>

    <!-- Volume -->
    <section>
      <h2>Volume</h2>
      <div class="vol-wrap">
        <div class="vol-row">
          <input type="range" id="vol-slider" min="-60" max="12" step="0.5" value="0">
          <span class="vol-val" id="vol-val">0.0 dB</span>
        </div>
        <div class="meter-strip">
          <div class="meter-fill" id="zone-meter-fill"></div>
        </div>
      </div>
    </section>

    <!-- Mute zone -->
    <section>
      <button id="mute-btn" class="mute-zone-btn">MUTE ZONE</button>
    </section>

  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/zone.js" defer></script>
</body>
</html>
