<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Patchbox Zone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    .dsp-section { margin-top: 1rem; margin-left: 1rem; margin-right: 1rem; padding: 0.5rem; border: 1px solid #444; border-radius: 4px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; font-weight: bold; }
    .toggle { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
    .toggle input { margin: 0; }
    .eq-bands .band { margin-bottom: 0.5rem; }
    .eq-bands label { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; }
    .eq-bands input { flex: 1; }
    .limiter-controls label { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; font-size: 0.85rem; }
    .limiter-controls input { flex: 1; }
    .gr-meter { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; margin-top: 0.3rem; }
    .gr-bar-bg { flex: 1; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
    .gr-bar { height: 100%; background: #e74c3c; width: 0%; transition: width 0.05s; }
  </style>
</head>
<body>
  <div class="zone-view">

    <!-- Zone header -->
    <header class="zone-view-header">
      <div style="display:flex; align-items:center; justify-content:space-between;">
        <div>
          <div class="zone-view-title" id="zone-title">Loading…</div>
          <div style="font-size:10px; color:var(--text-dim); letter-spacing:0.06em; margin-top:2px;">
            AUDIO ZONE
          </div>
        </div>
        <div class="ws-badge">
          <span class="ws-dot" id="ws-dot"></span>
          <span class="ws-label" id="ws-label">connecting…</span>
        </div>
      </div>
    </header>

    <!-- Source routing list -->
    <div class="zone-view-body">
      <div style="font-size:9px; text-transform:uppercase; letter-spacing:0.12em; color:var(--text-dim); margin-bottom:4px;">
        AUDIO SOURCES
      </div>
      <div id="source-list">
        <!-- Populated by zone.js -->
      </div>
    </div>

    <!-- EQ Section -->
    <section class="dsp-section" id="eq-section">
      <div class="section-header">
        <span>EQ</span>
        <label class="toggle"><input type="checkbox" id="eq-enabled"> <span>On</span></label>
      </div>
      <div class="eq-bands" id="eq-bands">
        <!-- 3 bands rendered by JS -->
      </div>
    </section>

    <!-- Limiter Section -->
    <section class="dsp-section" id="limiter-section">
      <div class="section-header">
        <span>Limiter</span>
        <label class="toggle"><input type="checkbox" id="lim-enabled"> <span>On</span></label>
      </div>
      <div class="limiter-controls">
        <label>Threshold <span id="lim-threshold-val">-1.0 dBFS</span>
          <input type="range" id="lim-threshold" min="-40" max="0" step="0.5" value="-1">
        </label>
        <label>Attack <span id="lim-attack-val">1.0 ms</span>
          <input type="range" id="lim-attack" min="0.1" max="50" step="0.1" value="1">
        </label>
        <label>Release <span id="lim-release-val">100 ms</span>
          <input type="range" id="lim-release" min="10" max="2000" step="10" value="100">
        </label>
      </div>
      <div class="gr-meter">
        GR: <span id="gr-db">0.0 dB</span>
        <div class="gr-bar-bg"><div class="gr-bar" id="gr-bar"></div></div>
      </div>
    </section>

    <!-- Footer: volume + mute -->
    <footer class="zone-footer">
      <div class="zone-volume-wrap">
        <div class="zone-volume-label">ZONE VOLUME</div>
        <input type="range" class="zone-vol-fader" id="output-fader"
               min="-30" max="6" step="0.5" value="0">
        <div class="zone-meter-bar">
          <div class="meter-fill" id="output-meter"></div>
        </div>
      </div>
      <span class="zone-vol-db" id="output-db">0.0 dB</span>
      <button class="zone-mute-big" id="mute-btn">MUTE</button>
    </footer>

  </div>

  <!-- Login overlay (injected if auth needed) -->
  <div class="login-overlay" id="login-overlay" hidden>
    <div class="login-box">
      <h2 class="login-title">AUTHENTICATION REQUIRED</h2>
      <div class="login-field">
        <label for="z-login-username">USERNAME</label>
        <input type="text" id="z-login-username" autocomplete="username" spellcheck="false">
      </div>
      <div class="login-field">
        <label for="z-login-password">PASSWORD</label>
        <input type="password" id="z-login-password" autocomplete="current-password">
      </div>
      <div class="login-error" id="z-login-error"></div>
      <button class="login-btn" id="z-login-btn">AUTHENTICATE</button>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/zone.js" defer></script>
</body>
</html>
