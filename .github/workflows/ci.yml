name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install mdbook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy
        # TODO s7-arch-warnings: tighten to -D warnings once 7 existing warnings are cleaned up.
        run: cargo clippy --workspace --all-targets --features inferno -- -W warnings
      - name: test
        run: cargo test --workspace --features inferno

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: eslint
        # continue-on-error while codebase is pre-lint; flip off once clean.
        continue-on-error: true
        run: npx --yes eslint@9 web/src/js --no-eslintrc --config web/.eslintrc.json || true
